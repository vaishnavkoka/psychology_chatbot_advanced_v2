version: '3.8'

services:
  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - python:3.11-slim
    container_name: psychology-chatbot-backend
    hostname: psychology-backend
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8000:8000"
    
    # Environment variables
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-your-groq-api-key-here}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENV=production
    
    # Volume mounts for data persistence
    volumes:
      - ./data:/app/data:rw
      - ./agents:/app/agents:ro
      - ./config:/app/config:ro
      - ./safety:/app/safety:ro
      - ./generated_reports:/app/generated_reports:rw
      - ./logs:/app/logs:rw
    
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Resource limits (optional - adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    # Network
    networks:
      - psychology-net
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      cache_from:
        - python:3.11-slim
    container_name: psychology-chatbot-frontend
    hostname: psychology-frontend
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8501:8501"
    
    # Environment variables for Streamlit
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_SHOW_ERROR_DETAILS=false
      - STREAMLIT_LOGGER_LEVEL=info
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    
    # Volumes
    volumes:
      - ./frontend_enhanced.py:/app/frontend_enhanced.py:ro
      - ./data:/app/data:ro
      - ./generated_reports:/app/generated_reports:rw
      - ./logs:/app/logs:rw
    
    # Service dependencies
    depends_on:
      backend:
        condition: service_healthy
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    # Network
    networks:
      - psychology-net
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  psychology-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-psychology

# Volumes for data persistence
volumes:
  backend-data:
    driver: local
  frontend-cache:
    driver: local
  logs:
    driver: local

