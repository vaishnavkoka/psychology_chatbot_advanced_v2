version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psychology-chatbot-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./config:/app/config
      - ./safety:/app/safety
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - psychology-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: psychology-chatbot-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend_enhanced.py:/app/frontend_enhanced.py:ro
    networks:
      - psychology-net
    command: streamlit run frontend_enhanced.py

networks:
  psychology-net:
    driver: bridge

volumes:
  data:
  agents:
  config:
  safety:
